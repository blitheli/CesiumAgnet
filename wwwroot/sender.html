<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Sender 测试页面</title>
    <script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@8.0.0/dist/browser/signalr.min.js"></script>
    <link rel="stylesheet" href="/styles.css">
    <style>
        main.layout {
            max-width: 480px;
            margin: 2em auto;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px #0001;
            padding: 2em;
        }
        .actions { margin-top: 1em; }
        pre.example { background: #f5f5f5; padding: 1em; border-radius: 4px; }
        .sample-btns { margin-bottom: 1em; } margin-bottom: 1em; }
    </style>
</head>
<body>
<main class="layout">
    <header>
        <h1>指令发送测试</h1>
        <p>用于测试 SignalR 指令发送与回传。</p>
    </header>

    <section class="connection-card">
        <label for="sessionId">发送端会话 ID</label>
        <input id="sessionId" type="text" value="test" autocomplete="off">
        <label for="receiverSessionId">接收端会话 ID</label>
        <input id="receiverSessionId" type="text" value="demo" autocomplete="off">
        <button id="joinBtn" type="button">连接并加入会话</button>
        <span id="connectionStatus" class="status" data-level="warn">未连接</span>
    </section>

    <section class="command-card">
        <label for="commandInput">标准 JSON 指令</label>
        <textarea id="commandInput" rows="10" spellcheck="false"></textarea>
        <div class="sample-btns actions">
            <button id="sampleSatelliteBtn" type="button">卫星示例</button>
            <button id="sampleStationBtn" type="button">地面站示例</button>
            <button id="clearBtn" type="button">清空</button>
        </div>
        <div class="actions">
            <button id="sendBtn" type="button">发送指令</button>
        </div>
    </section>

    <section>
        <h3>事件日志：</h3>
        <pre id="eventLog"></pre>
    </section>
</main>
<script>
    let connection = null;

    function appendLog(msg) {
        const log = document.getElementById("eventLog");
        log.textContent += `[${new Date().toLocaleTimeString()}] ${msg}\n`;
        log.scrollTop = log.scrollHeight;
    }

    function setConnectionState(text, level) {
        const status = document.getElementById("connectionStatus");
        status.textContent = text;
        status.dataset.level = level;
    }

    // 连接并加入会话
    document.getElementById("joinBtn").onclick = async function () {
        if (!connection) {
            connection = new signalR.HubConnectionBuilder()
                .withUrl("/hubs/commands")
                .withAutomaticReconnect()
                .build();

            connection.on("ReceiveResponse", function (response) {
                // 打印 status 字段
                if (response && response.status) {
                    appendLog("收到响应 status: " + response.status);
                } else {
                    appendLog("收到响应: " + JSON.stringify(response));
                }
            });

            connection.onclose(() => {
                setConnectionState("已断开", "error");
                appendLog("连接已断开。");
            });
        }

        if (connection.state !== signalR.HubConnectionState.Connected) {
            try {
                await connection.start();
                setConnectionState("已连接", "ok");
                appendLog("SignalR 连接成功。");
            } catch (err) {
                setConnectionState("连接失败", "error");
                appendLog("SignalR 连接失败: " + err.toString());
                return;
            }
        }

        const sessionId = document.getElementById("sessionId").value;
        try {
            await connection.invoke("JoinSession", sessionId);
            appendLog("已加入会话: " + sessionId);
        } catch (err) {
            appendLog("加入会话失败: " + err.toString());
        }
    };

    //  发送指令
    document.getElementById("sendBtn").onclick = async function () {
        if (!connection || connection.state !== signalR.HubConnectionState.Connected) {
            appendLog("请先连接 SignalR。");
            return;
        }
        const sessionId = document.getElementById("sessionId").value;
        const receiverSessionId = document.getElementById("receiverSessionId").value;
        let command;
        try {
            command = JSON.parse(document.getElementById("commandInput").value);
            command.sessionId = receiverSessionId;  //  这里是Cesium客户端
            command.SenderSessionId = sessionId;
        } catch (e) {
            appendLog("请输入有效的 JSON 指令！");
            return;
        }
        try {
            await connection.invoke("SendCommand", command);
            appendLog("已发送指令: " + JSON.stringify(command));
        } catch (err) {
            appendLog("发送指令失败: " + err.toString());
        }
    };

    document.getElementById("sampleSatelliteBtn").onclick = function () {
        document.getElementById("commandInput").value =
            `{
  "target": "entity",
  "action": "createSatellite",
  "params": {
    "id": "SAT-01",
    "name": "Starlink Demo",
    "longitude": 116.391,
    "latitude": 39.907,
    "altitude": 550000,
    "color": "#00d4ff"
  }
}`;
    };
    document.getElementById("sampleStationBtn").onclick = function () {
        document.getElementById("commandInput").value =
            `{
  "target": "entity",
  "action": "createGroundStation",
  "params": {
    "id": "GS-01",
    "name": "北京地面站",
    "longitude": 116.391,
    "latitude": 39.907,
    "color": "#ff9800"
  }
}`;
    };
    document.getElementById("clearBtn").onclick = function () {
        document.getElementById("commandInput").value = "";
    };
</script>
</body>
</html>
